<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simay Gül | Sanat Portfolyosu</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300..700;1,300..700&display=swap" rel="stylesheet">

    <style>
        /* Genel Sıfırlama */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        /* Ana Gövde */
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background-color: #0a0a0a; 
            color: #f5f5f5; 
            line-height: 1.6; 
        }
        
        /* Başlık Alanı */
        header { padding: 4rem 2rem 2rem 2rem; text-align: center; max-width: 1200px; margin: 0 auto; }
        header h1 { 
            font-family: 'Cormorant Garamond', serif; 
            font-size: 3.5rem; 
            font-weight: 500; 
            letter-spacing: 2px; 
            text-transform: uppercase; 
            margin-bottom: 0.5rem; 
            color: #ffffff; 
        }
        header p { font-size: 1rem; color: #a0a0a0; font-weight: 300; }
        
        /* Menü Navigasyonu */
        nav { text-align: center; margin-bottom: 3rem; }
        nav a { color: #a0a0a0; text-decoration: none; margin: 0 1rem; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; transition: color 0.3s; }
        nav a:hover, nav a.active { color: #ffffff; }
        
        /* Galeri Izgarası */
        .gallery-container { max-width: 1400px; margin: 0 auto; padding: 0 2rem; margin-bottom: 6rem; }
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 2rem; }
        
        /* Galeri Kartları */
        .gallery-item { position: relative; overflow: hidden; background-color: #141414; border-radius: 4px; cursor: pointer; aspect-ratio: 4 / 3; }
        .gallery-item img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1); }
        .gallery-item:hover img { transform: scale(1.05); }
        
        /* Resim Üzeri Yazılar */
        .item-overlay { position: absolute; bottom: 0; left: 0; right: 0; background: linear-gradient(transparent, rgba(0, 0, 0, 0.85)); padding: 1.5rem; opacity: 0; transition: opacity 0.3s ease; }
        .gallery-item:hover .item-overlay { opacity: 1; }
        .item-overlay h3 { font-size: 1.1rem; font-weight: 400; margin-bottom: 0.2rem; }
        .item-overlay p { font-size: 0.85rem; color: #cccccc; }
        
        /* Footer */
        footer { padding: 4rem 2rem; text-align: center; border-top: 1px solid #1a1a1a; color: #666666; font-size: 0.85rem; }
        
        /* Büyüteç (Lightbox) Mekanizması */
        .lightbox { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(5, 5, 5, 0.98); display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.4s ease; z-index: 1000; padding: 2rem; }
        .lightbox.active { opacity: 1; pointer-events: auto; }
        .lightbox-content { max-width: 90%; max-height: 85vh; box-shadow: 0 10px 30px rgba(0,0,0,0.5); object-fit: contain; }
        .lightbox-close { position: absolute; top: 2rem; right: 2rem; color: #ffffff; font-size: 2rem; cursor: pointer; background: none; border: none; }
        
        /* Mobil Uyum */
        @media (max-width: 768px) { header h1 { font-size: 2.2rem; } .gallery-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <header>
        <h1>Simay Gül</h1>
        <p>Resim Öğrencisi & Görsel Sanatçı</p>
    </header>

    <nav>
        <a href="index.html" class="active">Galeri</a>
        <a href="hakkimda.html">Hakkımda</a>
    </nav>

    <main class="gallery-container">
        <div class="gallery-grid">
            
            <div class="gallery-item" onclick="openLightbox(this)">
                <img src="https://picsum.photos/800/600?random=1" alt="Eser 1">
                <div class="item-overlay">
                    <h3>Eser Başlığı</h3>
                    <p>Yağlı Boya - 2026</p>
                </div>
            </div>

            <div class="gallery-item" onclick="openLightbox(this)">
                <img src="https://picsum.photos/800/600?random=2" alt="Eser 2">
                <div class="item-overlay">
                    <h3>Eser Başlığı</h3>
                    <p>Karakalem - 2026</p>
                </div>
            </div>

            <div class="gallery-item" onclick="openLightbox(this)">
                <img src="https://picsum.photos/800/600?random=3" alt="Eser 3">
                <div class="item-overlay">
                    <h3>Eser Başlığı</h3>
                    <p>Dijital Çizim - 2025</p>
                </div>
            </div>

        </div>
    </main>

    <footer>
        <p>&copy; 2026 Tüm Hakları Saklıdır.</p>
    </footer>

    <div class="lightbox" id="lightbox" onclick="closeLightbox()">
        <button class="lightbox-close">&times;</button>
        <img class="lightbox-content" id="lightbox-img" src="" alt="">
    </div>

    <script>
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');
        
        function openLightbox(element) {
            lightboxImg.src = element.querySelector('img').src;
            lightbox.classList.add('active');
        }
        
        function closeLightbox() {
            lightbox.classList.remove('active');
            setTimeout(() => { lightboxImg.src = ''; }, 400);
        }
        
        document.addEventListener('keydown', (e) => { 
            if (e.key === 'Escape') closeLightbox(); 
        });
    </script>
</body>
</html>
